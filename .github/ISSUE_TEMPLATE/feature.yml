name: Feature request
description: Suggest a new capability or improvement.
title: "[FEATURE] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the use case, not the implementation.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would the API, command, or MCP tool look like?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false

  - type: dropdown
    id: component
    attributes:
      label: Affected component
      options:
        - Library (gokd)
        - CLI (cmd/gokd)
        - MCP server (cmd/gokd-mcp)
        - lablink integration (-remote)
    validations:
      required: true

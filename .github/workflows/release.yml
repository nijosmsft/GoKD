name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build & publish release (windows-latest)
    runs-on: windows-latest
    timeout-minutes: 30

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go 1.25
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          check-latest: true
          cache: true

      - name: Set up MSYS2 / MinGW-w64
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          path-type: inherit
          install: >-
            make
            mingw-w64-x86_64-gcc

      - name: Show toolchain versions
        run: |
          set -euo pipefail
          go version
          g++ --version | head -1
          make --version | head -1

      # CLAUDE.md: WINDBG_SDK / WINDOWS_SDK_INCLUDE must be unset so MinGW
      # picks up its own dbgeng.h / dbghelp.h.
      - name: Build C++ shim (libgokd_shim.a)
        run: |
          set -euo pipefail
          unset WINDBG_SDK WINDOWS_SDK_INCLUDE
          make -C cshim

      - name: Build Go binaries
        run: |
          set -euo pipefail
          unset WINDBG_SDK WINDOWS_SDK_INCLUDE
          mkdir -p bin
          go build -o bin/ ./...

      - name: Stage release directory
        run: |
          set -euo pipefail
          REL="gokd-${GITHUB_REF_NAME}-windows-amd64"
          mkdir -p "staging/${REL}"
          cp bin/gokd.exe         "staging/${REL}/"
          cp bin/gokd-mcp.exe     "staging/${REL}/"
          # MinGW runtime DLLs required at process start (libstdc++ etc.).
          cp /c/msys64/mingw64/bin/libstdc++-6.dll      "staging/${REL}/"
          cp /c/msys64/mingw64/bin/libgcc_s_seh-1.dll   "staging/${REL}/"
          cp /c/msys64/mingw64/bin/libwinpthread-1.dll  "staging/${REL}/"
          cp README.md  "staging/${REL}/"
          cp LICENSE    "staging/${REL}/"
          cp packaging/release/INSTALL.txt "staging/${REL}/"
          ls -la "staging/${REL}/"

      - name: Create zip and SHA256SUMS
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $rel = "gokd-$env:GITHUB_REF_NAME-windows-amd64"
          $zip = "$rel.zip"
          Compress-Archive -Path "staging/$rel" -DestinationPath $zip -Force
          $hash = (Get-FileHash -Algorithm SHA256 $zip).Hash.ToLower()
          "$hash  $zip" | Out-File -FilePath SHA256SUMS.txt -Encoding ascii
          Get-Content SHA256SUMS.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            gokd-${{ github.ref_name }}-windows-amd64.zip
            SHA256SUMS.txt
